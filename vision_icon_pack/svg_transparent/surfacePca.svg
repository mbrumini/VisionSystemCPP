<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">

    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1F2937"/>
        <stop offset="1" stop-color="#0B1220"/>
      </linearGradient>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

<g filter="url(#glow)">
<circle cx="48" cy="48" r="4" fill="#FFD166" stroke="#FFD166" stroke-width="1" opacity="1"/>
<ellipse cx="48" cy="48" rx="30" ry="12" fill="none" stroke="#0F172A" stroke-width="4" transform="rotate(-25 48 48)"/>
<line x1="22" y1="62" x2="74" y2="34" stroke="#FFD166" stroke-width="5" stroke-linecap="round"/>
</g>
</svg>