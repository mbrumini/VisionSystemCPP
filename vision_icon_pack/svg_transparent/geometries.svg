<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">

    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1F2937"/>
        <stop offset="1" stop-color="#0B1220"/>
      </linearGradient>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

<g filter="url(#glow)">
<circle cx="35" cy="35" r="12" fill="none" stroke="#C084FC" stroke-width="5" opacity="1"/>
<rect x="48" y="48" width="26" height="26" rx="4" fill="none" stroke="#0F172A" stroke-width="5" opacity="1"/>
<line x1="28" y1="70" x2="70" y2="28" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
</g>
</svg>