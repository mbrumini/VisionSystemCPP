<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">

    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1F2937"/>
        <stop offset="1" stop-color="#0B1220"/>
      </linearGradient>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

<g filter="url(#glow)">
<circle cx="48" cy="48" r="25" fill="none" stroke="#0F172A" stroke-width="4" opacity="1"/>
<line x1="48" y1="48" x2="69" y2="34" stroke="#FB7185" stroke-width="5" stroke-linecap="round"/>
<circle cx="48" cy="48" r="4" fill="#FB7185" stroke="#FB7185" stroke-width="1" opacity="1"/>
<text x="37" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0F172A">R</text>
</g>
</svg>