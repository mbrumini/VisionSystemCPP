<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96">

    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#1F2937"/>
        <stop offset="1" stop-color="#0B1220"/>
      </linearGradient>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

<g filter="url(#glow)">
<polygon points="26,26 70,31 66,72 30,68" fill="#C084FC" stroke="#C084FC" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"/>
<polygon points="26,26 70,31 66,72 30,68" fill="none" stroke="#0F172A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="1"/>
</g>
</svg>